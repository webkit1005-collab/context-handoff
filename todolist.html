  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"zh\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>TODOLIST — Context Handoff<\u002Ftitle>\n<style>/* ============================================================\n   Context Handoff — shared theme\n   Blue / white / black / gray · light + dark · 灵动简约\n   Single source of truth for every page's palette + the\n   floating theme toggle. Pages reference these tokens only.\n   ============================================================ */\n\n/* ---------- DARK (default) ---------- */\n:root,\n[data-theme=\"dark\"] {\n  color-scheme: dark;\n\n  /* tweakable: global font-size bump (px), overridden by theme.js */\n  --fz: 2px;\n\n  /* base */\n  --bg: #0a0c10;\n  --surface: #14161d;\n  --surface2: #1c1f28;\n  --border: #232a37;\n  --border2: #2c3442;\n  --text: #e9ecf3;\n  --muted: #6f7790;\n  --faint: #474e60;\n  --faint2: #383f4f;\n\n  /* accent — blue */\n  --accent: #4a8fff;\n  --accent-dim: rgba(74,143,255,0.13);\n  --accent-line: rgba(74,143,255,0.32);\n\n  /* semantic */\n  --green: #4ade80;\n  --red: #f87171;\n  --amber: #fbbf24;\n  --amber-dim: rgba(251,191,36,0.10);\n  --amber-line: rgba(251,191,36,0.16);\n\n  /* effects */\n  --shadow: none;\n  --shadow-hover: 0 0 0 1px var(--accent-line);\n  --press-shadow: inset 0 2px 8px rgba(0,0,0,0.42);\n  --overlay: rgba(0,0,0,0.78);\n  --on-accent: #ffffff;\n\n  /* ---- todolist aliases (same palette, legacy names) ---- */\n  --blue: var(--accent);\n  --blue-dim: #1e3a6e;\n  --blue-glow: var(--accent-dim);\n  --white: var(--text);\n  --muted2: #8089a3;\n  --card-bg: #21242f;\n  --card-bg-done: #1b1d26;\n  --card-text: #dde3ef;\n  --card-meta: #6b7494;\n  --card-border: rgba(255,255,255,0.07);\n  --card-hover: rgba(220,228,242,0.14);\n  --hairline: rgba(255,255,255,0.08);\n  --urgent: #ff7040;\n  --urgent-bg: rgba(255,112,64,0.10);\n  --urgent-border: rgba(255,96,96,0.30);\n  --stats-bg: #1f222c;\n  --modal-bg: #141720;\n}\n\n/* ---------- LIGHT ---------- */\n[data-theme=\"light\"] {\n  color-scheme: light;\n\n  --bg: #f4f6fa;\n  --surface: #ffffff;\n  --surface2: #f7f8fb;\n  --border: #e7eaf1;\n  --border2: #dfe3ec;\n  --text: #161a23;\n  --muted: #6c7488;\n  --faint: #aab1c2;\n  --faint2: #c2c7d2;\n\n  --accent: #2f6bff;\n  --accent-dim: rgba(47,107,255,0.09);\n  --accent-line: rgba(47,107,255,0.26);\n\n  --green: #16a34a;\n  --red: #e5484d;\n  --amber: #d97706;\n  --amber-dim: rgba(217,119,6,0.08);\n  --amber-line: rgba(217,119,6,0.18);\n\n  --shadow: none;\n  --shadow-hover: 0 6px 20px rgba(26,34,56,0.10);\n  --press-shadow: inset 0 2px 7px rgba(26,34,56,0.14);\n  --overlay: rgba(20,28,46,0.32);\n  --on-accent: #ffffff;\n\n  --blue: var(--accent);\n  --blue-dim: #bcd2ff;\n  --blue-glow: var(--accent-dim);\n  --white: var(--text);\n  --muted2: #6c7488;\n  --card-bg: #ffffff;\n  --card-bg-done: #f1f3f8;\n  --card-text: #1d2230;\n  --card-meta: #8a91a3;\n  --card-border: #e7eaf1;\n  --card-hover: #f7f9fc;\n  --hairline: #ebeef3;\n  --urgent: #f2683c;\n  --urgent-bg: rgba(242,104,60,0.09);\n  --urgent-border: rgba(242,104,60,0.28);\n  --stats-bg: #ffffff;\n  --modal-bg: #ffffff;\n}\n\n/* themed page background — survives host quirks via specificity */\nhtml[data-theme] { background: var(--bg); transition: background 0.35s ease; }\n\n/* full-viewport backdrop layer injected by theme.js (insurance) */\n.ch-bg-layer {\n  position: fixed; inset: 0; z-index: -1;\n  background: var(--bg);\n  transition: background 0.35s ease;\n  pointer-events: none;\n}\n\n/* smooth cross-fade on theme switch */\nbody { transition: background 0.35s ease, color 0.35s ease; }\n\n/* ---------- floating theme toggle (injected by theme.js) ---------- */\n.ch-theme-toggle {\n  position: fixed;\n  bottom: 22px; right: 22px;\n  width: 44px; height: 44px;\n  border-radius: 13px;\n  border: 1px solid var(--border2);\n  background: var(--surface);\n  color: var(--muted);\n  cursor: pointer;\n  display: flex; align- us: 14px; padding: 26px; width: 340px; max-width: 90vw; box-shadow: 0 16px 50px rgba(0,0,0,0.25); }\n  .modal h3 { font-size: calc(11px + var(--fz)); font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }\n  .modal input { width: 100%; background: var(--surface); border: 1px solid var(--border2); border-radius: 8px; color: var(--white); font-family: 'DM Sans', sans-serif; font-size: calc(13px + var(--fz)); padding: 10px 12px; outline: none; margin-bottom: 12px; transition: border-color 0.2s; }\n  .modal input:focus { border-color: var(--blue); }\n  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }\n  .modal-btns button { font-family: 'DM Sans', sans-serif; font-size: calc(11px + var(--fz)); font-weight: 600; letter-spacing: 0.06em; padding: 9px 18px; border-radius: 7px; cursor: pointer; border: none; transition: opacity 0.15s; }\n  .btn-cancel { background: var(--surface); color: var(--muted2); border: 1px solid var(--border2) !important; }\n  .btn-confirm { background: var(--blue); color: #fff; transition: transform 0.15s, box-shadow 0.15s; }\n  .btn-cancel:hover { opacity: 0.85; }\n  .btn-confirm:hover { transform: translateY(1px); box-shadow: var(--press-shadow); }\n  .tab-wrap { position: relative; display: inline-flex; }\n  .tab-del { position: absolute; right: -5px; top: -5px; width: 15px; height: 15px; border-radius: 50%; background: #ff5050; color: #fff; font-size: calc(9px + var(--fz)); border: none; cursor: pointer; display: none; align-items: center; justify-content: center; padding: 0; z-index: 1; }\n  .tab-wrap:hover .tab-del { display: flex; }\n  .tab.drag-over { background: var(--blue) !important; border-color: var(--blue) !important; color: #fff !important; }\n  .sync-status { font-size: calc(11px + var(--fz)); color: var(--muted); text-align: right; margin-top: 3px; min-height: 14px; }\n  .prompt-chevron { font-size: calc(11px + var(--fz)); color: var(--muted2); transition: transform 0.2s; margin-left: 6px; display: inline-block; }\n  .prompt-chevron.open { transform: rotate(180deg); }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"wrap\">\n  <a class=\"nav-back\" href=\"index.html\">← BACK<\u002Fa>\n\n  <div class=\"top\">\n    <div class=\"title-block\">\n      <h1>TODOLIST<\u002Fh1>\n      <p>每次新对话开始，把未完成的带进去<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"date-block\">\n      <div class=\"date-display\" id=\"dateDisplay\"><\u002Fdiv>\n      <div class=\"time-display\" id=\"timeDisplay\"><\u002Fdiv>\n      <div class=\"sync-status\" id=\"syncStatus\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"stats-bar\">\n    <div class=\"stat stat-h\"><div class=\"stat-num\" id=\"sTodo\">0<\u002Fdiv><div class=\"stat-label\">待捡起<\u002Fdiv><\u002Fdiv>\n    <div class=\"stat stat-h\"><div class=\"stat-num\" id=\"sDone\">0<\u002Fdiv><div class=\"stat-label\">已完成<\u002Fdiv><\u002Fdiv>\n    <div class=\"stat stat-alert\" id=\"sAlert\" style=\"display:none\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"list-tabs\" id=\"listTabs\"><\u002Fdiv>\n\n  <div class=\"input-area\">\n    <div class=\"input-row\">\n      <input type=\"text\" id=\"inp\" placeholder=\"没说完的事、想聊的话题…\" maxlength=\"200\">\n      <button onclick=\"add()\">加入<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"extra-row\">\n      <input type=\"text\" id=\"noteInp\" placeholder=\"备注（可选）\" maxlength=\"100\">\n      <input type=\"date\" id=\"ddlInp\" title=\"DDL\">\n      <select class=\"prio-select\" id=\"prioInp\">\n        <option value=\"normal\">普通<\u002Foption>\n        <option value=\"urgent\">紧急<\u002Foption>\n      <\u002Fselect>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"prompt-box\" id=\"promptBox\">\n    <div class=\"plabel\" onclick=\"togglePrompt()\">\n      <span>Session 开头插入 <span id=\"promptCount\" style=\"opacity:0.55;font-size: calc(10px + var(--fz))\"><\u002Fspan><span class=\"prompt-chevron\" id=\"promptChevron\">▼<\u002Fspan><\u002Fspan>\n      <button class=\"copy-btn\" id=\"promptCopyBtn\" onclick=\"event.stopPropagation();copyP()\" style=\"display:none\">复制<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"prompt-text\" id=\"promptText\" style=\"display:none;margin-top:12px\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"section\">\n    <div class=\"sec-header\">\n      <span class=\"sec-label\">待捡起<\u002Fspan>\n      <span class=\"sec-count\" id=\"pendCount\">0<\u002Fspan>\n    <\u002Fdiv>\n    <div id=\"pendList\"><\u002Fdiv>\n  <\u002Fdiv>\n  <hr class=\"divider\">\n  <div class=\"section\">\n    <div class=\"sec-header\">\n      <span class=\"sec-label\">已完成<\u002Fspan>\n      <button class=\"clear-btn\" onclick=\"clearDone()\">清空<\u002Fbutton>\n    <\u002Fdiv>\n    <div id=\"doneList\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"modal-bg\" id=\"editModalBg\">\n  <div class=\"modal\">\n    <h3>编辑<\u002Fh3>\n    <input type=\"text\" id=\"editText\" placeholder=\"话题\" maxlength=\"200\">\n    <input type=\"text\" id=\"editNote\" placeholder=\"备注（可选）\" maxlength=\"100\">\n    <div class=\"modal-row\">\n      <input type=\"date\" id=\"editDdl\">\n      <select id=\"editPrio\"><option value=\"normal\">普通<\u002Foption><option value=\"urgent\">紧急<\u002Foption><\u002Fselect>\n    <\u002Fdiv>\n    <div class=\"modal-btns\">\n      <button class=\"btn-cancel\" onclick=\"closeEditModal()\">取消<\u002Fbutton>\n      <button class=\"btn-confirm\" onclick=\"saveEdit()\">保存<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"modal-bg\" id=\"modalBg\">\n  <div class=\"modal\">\n    <h3>新建 List<\u002Fh3>\n    <input type=\"text\" id=\"listNameInp\" placeholder=\"列表名称，如：学习、生活…\" maxlength=\"20\">\n    <div class=\"modal-btns\">\n      <button class=\"btn-cancel\" onclick=\"closeModal()\">取消<\u002Fbutton>\n      <button class=\"btn-confirm\" onclick=\"confirmAddList()\">创建<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  const GH = {\n    get token() { return localStorage.getItem('ch_token') || ''; },\n    repo: 'webkit1005-collab/todolist-data',\n    file: 'state.json',\n    sha: null,\n    url() { return `https://api.github.com/repos/${this.repo}/contents/${this.file}`; }\n  };\n\n  let state = { lists: ['全部', '学习', '生活', 'vibecoding'], activeList: '全部', topics: [] };\n\n  function syncStatus(msg) { const el = document.getElementById('syncStatus'); if (el) el.textContent = msg; }\n\n  async function cloudLoad() {\n    try {\n      const res = await fetch(GH.url(), { headers: { Authorization: `token ${GH.token}`, Accept: 'application/vnd.github.v3+json' } });\n      if (!res.ok) return null;\n      const data = await res.json();\n      GH.sha = data.sha;\n      return JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\\n/g,'')))));\n    } catch(e) { return null; }\n  }\n\n  let saveTimer = null;\n  async function fetchSha() {\n    const res = await fetch(GH.url() + '?t=' + Date.now(), { headers: { Authorization: `token ${GH.token}`, Accept: 'application/vnd.github.v3+json' } });\n    if (res.ok) { const d = await res.json(); GH.sha = d.sha; } else { GH.sha = null; }\n  }\n  async function putState() {\n    const content = btoa(unescape(encodeURIComponent(JSON.stringify(state))));\n    const body = { message: 'sync', content };\n    if (GH.sha) body.sha = GH.sha;\n    return fetch(GH.url(), { method: 'PUT', headers: { Authorization: `token ${GH.token}`, 'Content-Type': 'application/json', Accept: 'application/vnd.github.v3+json' }, body: JSON.stringify(body) });\n  }\n  async function cloudSave() {\n    syncStatus('同步中…');\n    try {\n      await fetchSha();\n      let res = await putState();\n      if (res.status === 409) { await fetchSha(); res = await putState(); }\n      if (res.ok) { const data = await res.json(); GH.sha = data.content?.sha; syncStatus('已同步 ✓'); setTimeout(() => syncStatus(''), 2000); }\n      else { syncStatus('同步失败'); }\n    } catch(e) { syncStatus('同步失败'); }\n  }\n\n  const save = () => { localStorage.setItem('tq4', JSON.stringify(state)); clearTimeout(saveTimer); saveTimer = setTimeout(cloudSave, 800); };\n  const esc = s => s.replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;').replace(/>/g,'&gt;');\n  const fmt = ts => { if (!ts) return ''; const d = new Date(ts); return `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`; };\n  const fmtDate = s => s ? s.replace(/-/g, '/').slice(5) : '';\n  const isNearDdl = ddl => { if (!ddl) return false; const diff = new Date(ddl) - new Date(); return diff > 0 && diff < 3 * 24 * 3600 * 1000; };\n  const isPastDdl = ddl => ddl && new Date(ddl) < new Date();\n\n  function add() {\n    const text = document.getElementById('inp').value.trim();\n    if (!text) return;\n    const note = document.getElementById('noteInp').value.trim();\n    const ddl = document.getElementById('ddlInp').value;\n    const prio = document.getElementById('prioInp').value;\n    const list = state.activeList === '全部' ? '生活' : state.activeList;\n    state.topics.unshift({ id: Date.now(), text, note, ddl, prio, list, done: false, created: Date.now(), doneAt: null });\n    document.getElementById('inp').value = '';\n    document.getElementById('noteInp').value = '';\n    document.getElementById('ddlInp').value = '';\n    document.getElementById('prioInp').value = 'normal';\n    save(); render();\n  }\n  function toggle(id) { const it = state.topics.find(x => x.id === id); if (!it) return; it.done = !it.done; it.doneAt = it.done ? Date.now() : null; save(); render(); }\n  function del(id) { state.topics = state.topics.filter(x => x.id !== id); save(); render(); }\n  function clearDone() { const vis = visibleTopics(); const doneIds = new Set(vis.filter(x => x.done).map(x => x.id)); state.topics = state.topics.filter(x => !doneIds.has(x.id)); save(); render(); }\n  function setList(l) { state.activeList = l; save(); render(); }\n\n  let dragId = null;\n  function onDragStart(e, id) { dragId = id; e.dataTransfer.effectAllowed = 'move'; }\n  function onDragOver(e, list) { if (list === '全部') return; e.preventDefault(); e.currentTarget.classList.add('drag-over'); }\n  function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }\n  function onDrop(e, list) { e.currentTarget.classList.remove('drag-over'); if (!dragId || list === '全部') return; const t = state.topics.find(x => x.id === dragId); if (t) { t.list = list; save(); render(); } dragId = null; }\n\n  function deleteList(name) { const fallback = state.lists.find(l => l !== '全部' && l !== name) || '生活'; state.topics.forEach(t => { if (t.list === name) t.list = fallback; }); state.lists = state.lists.filter(l => l !== name); if (state.activeList === name) state.activeList = '全部'; save(); render(); }\n  function renameList(name) { const newName = prompt(`重命名「${name}」：`, name); if (!newName || newName === name) return; if (state.lists.includes(newName)) { alert('名称已存在'); return; } state.lists = state.lists.map(l => l === name ? newName : l); state.topics.forEach(t => { if (t.list === name) t.list = newName; }); if (state.activeList === name) state.activeList = newName; save(); render(); }\n\n  let promptCollapsed = true;\n  function togglePrompt() { promptCollapsed = !promptCollapsed; document.getElementById('promptText').style.display = promptCollapsed ? 'none' : 'block'; document.getElementById('promptCopyBtn').style.display = promptCollapsed ? 'none' : 'inline-block'; document.getElementById('promptChevron').classList.toggle('open', !promptCollapsed); }\n\n  let editingId = null;\n  function editTopic(id) { const t = state.topics.find(x => x.id === id); if (!t) return; editingId = id; document.getElementById('editText').value = t.text; document.getElementById('editNote').value = t.note || ''; document.getElementById('editDdl').value = t.ddl || ''; document.getElementById('editPrio').value = t.prio || 'normal'; document.getElementById('editModalBg').classList.add('show'); document.getElementById('editText').focus(); }\n  function closeEditModal() { document.getElementById('editModalBg').classList.remove('show'); editingId = null; }\n  function saveEdit() { const t = state.topics.find(x => x.id === editingId); if (!t) return closeEditModal(); const text = document.getElementById('editText').value.trim(); if (text) t.text = text; t.note = document.getElementById('editNote').value.trim(); t.ddl = document.getElementById('editDdl').value; t.prio = document.getElementById('editPrio').value; save(); render(); closeEditModal(); }\n\n  function openModal() { document.getElementById('modalBg').classList.add('show'); document.getElementById('listNameInp').focus(); }\n  function closeModal() { document.getElementById('modalBg').classList.remove('show'); document.getElementById('listNameInp').value = ''; }\n  function confirmAddList() { const name = document.getElementById('listNameInp').value.trim(); if (!name || state.lists.includes(name)) return closeModal(); state.lists.push(name); state.activeList = name; save(); render(); closeModal(); }\n\n  function copyP() { navigator.clipboard.writeText(document.getElementById('promptText').textContent).then(() => { const b = document.querySelector('.copy-btn'); b.textContent = '已复制 ✓'; setTimeout(() => b.textContent = '复制', 1600); }); }\n\n  function visibleTopics() { if (state.activeList === '全部') return state.topics; return state.topics.filter(x => x.list === state.activeList); }\n\n  function render() {\n    const all = state.topics;\n    const vis = visibleTopics();\n    const pend = vis.filter(x => !x.done);\n    const done = vis.filter(x => x.done);\n    document.getElementById('sTodo').textContent = all.filter(x=>!x.done).length;\n    document.getElementById('sDone').textContent = all.filter(x=>x.done).length;\n    const alertCount = all.filter(x=>!x.done && (x.prio==='urgent' || isNearDdl(x.ddl))).length;\n    const alertEl = document.getElementById('sAlert');\n    if (alertCount > 0) { alertEl.style.display = 'block'; alertEl.innerHTML = `<div class=\"stat-num\">${alertCount}<\u002Fdiv><div class=\"stat-label\">紧急/即将到期<\u002Fdiv>`; } else { alertEl.style.display = 'none'; }\n    document.getElementById('pendCount').textContent = pend.length;\n    document.getElementById('listTabs').innerHTML =\n      state.lists.map(l => {\n        const canEdit = l !== '全部';\n        const drag = `ondragover=\"onDragOver(event,'${l}')\" ondragleave=\"onDragLeave(event)\" ondrop=\"onDrop(event,'${l}')\"`;\n        const tab = `<button class=\"tab${state.activeList===l?' active':''}\" onclick=\"setList('${l}')\" ondblclick=\"${canEdit?`renameList('${l}')`:''}\" ${drag}>${l}<\u002Fbutton>`;\n        const del = canEdit ? `<button class=\"tab-del\" onclick=\"event.stopPropagation();deleteList('${l}')\">×<\u002Fbutton>` : '';\n        return `<div class=\"tab-wrap\">${tab}${del}<\u002Fdiv>`;\n      }).join('') + `<button class=\"tab add-list\" onclick=\"openModal()\" title=\"新建列表\">+<\u002Fbutton>`;\n    const cardHtml = (t, isDone) => {\n      const nearDdl = isNearDdl(t.ddl); const pastDdl = isPastDdl(t.ddl);\n      return `<div class=\"topic-item${isDone?' done':''}${t.prio==='urgent'&&!isDone?' urgent':''}\" draggable=\"true\" ondragstart=\"onDragStart(event,${t.id})\">\n        <div class=\"check${isDone?' on':''}\" onclick=\"toggle(${t.id})\"><\u002Fdiv>\n        <div class=\"topic-body\">\n          <div class=\"topic-text\">${esc(t.text)}<\u002Fdiv>\n          ${t.note ? `<div class=\"topic-note\">${esc(t.note)}<\u002Fdiv>` : ''}\n          <div class=\"topic-meta\">\n            <span>${fmt(t.created)}<\u002Fspan>\n            ${t.prio==='urgent'&&!isDone ? `<span class=\"urgent-badge\">紧急<\u002Fspan>` : ''}\n            ${t.ddl && !isDone ? `<span class=\"ddl-tag${nearDdl||pastDdl?' near':''}\">DDL ${fmtDate(t.ddl)}${pastDdl?' ⚠':''}${nearDdl?' 快到了':''}<\u002Fspan>` : ''}\n            ${isDone && t.doneAt ? `<span>完成 ${fmt(t.doneAt)}<\u002Fspan>` : ''}\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"topic-actions\">\n          <button class=\"act-btn edit\" onclick=\"editTopic(${t.id})\">✎<\u002Fbutton>\n          <button class=\"act-btn\" onclick=\"del(${t.id})\">×<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>`;\n    };\n    document.getElementById('pendList').innerHTML = pend.length ? pend.sort((a,b) => (b.prio==='urgent'?1:0)-(a.prio==='urgent'?1:0) || a.created-b.created).map(t => cardHtml(t, false)).join('') : '<div class=\"empty\">暂无话题<\u002Fdiv>';\n    document.getElementById('doneList').innerHTML = done.length ? done.map(t => cardHtml(t, true)).join('') : '<div class=\"empty\">暂无<\u002Fdiv>';\n    const box = document.getElementById('promptBox');\n    const urgentPend = pend.filter(x => x.prio==='urgent');\n    const normalPend = pend.filter(x => x.prio!=='urgent');\n    const allPend = [...urgentPend, ...normalPend];\n    if (allPend.length > 0) {\n      box.style.display = 'block';\n      const now = new Date();\n      const dateStr = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')}`;\n      const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;\n      document.getElementById('promptCount').textContent = `(${allPend.length}条)`;\n      document.getElementById('promptText').textContent = `[#TODOlist] ${dateStr} ${timeStr}\\n以下是我们上次没说完的话题，请在对话中自然地捡起：\\n\\n` + allPend.map((t,i) => `${i+1}. ${t.prio==='urgent'?'[紧急] ':''}${t.text}${t.note?' ('+t.note+')':''}${t.ddl?' DDL:'+t.ddl:''}`).join('\\n');\n    } else { box.style.display = 'none'; }\n  }\n\n  function updateClock() {\n    const now = new Date();\n    document.getElementById('dateDisplay').textContent = `${now.getMonth()+1}/${now.getDate()}`;\n    document.getElementById('timeDisplay').textContent = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;\n  }\n  updateClock(); setInterval(updateClock, 1000);\n\n  document.getElementById('inp').addEventListener('keydown', e => { if (e.key==='Enter') add(); });\n  document.getElementById('modalBg').addEventListener('click', e => { if (e.target===document.getElementById('modalBg')) closeModal(); });\n  document.getElementById('editModalBg').addEventListener('click', e => { if (e.target===document.getElementById('editModalBg')) closeEditModal(); });\n  document.getElementById('editText').addEventListener('keydown', e => { if (e.key==='Enter') saveEdit(); });\n  document.getElementById('listNameInp').addEventListener('keydown', e => { if (e.key==='Enter') confirmAddList(); });\n\n  async function init() {\n    if (!GH.token) { syncStatus('未设置 Token，请先在首页配置'); return; }\n    syncStatus('加载中…');\n    const cloud = await cloudLoad();\n    if (cloud && cloud.topics && cloud.topics.length > 0) { state = cloud; syncStatus(''); }\n    else {\n      const local = JSON.parse(localStorage.getItem('tq4') || 'null');\n      if (local && local.topics && local.topics.length > 0) { state = local; await cloudSave(); }\n      else if (cloud) { state = cloud; syncStatus(''); }\n      else { syncStatus(''); }\n    }\n    render();\n  }\n  init();\n<\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"
  </script>
