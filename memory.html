<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEMORY — Context Handoff</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0f; --surface: #161618; --surface2: #1e1e21;
    --border: #2a2a2e; --text: #e8e8ea; --muted: #666;
    --accent: #7c6ef5; --accent-dim: rgba(124,110,245,0.12);
    --green: #4ade80; --red: #f87171;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 40px 24px; }
  .header { max-width: 680px; margin: 0 auto 48px; display: flex; justify-content: space-between; align-items: center; }
  .back { font-size: 11px; color: var(--muted); text-decoration: none; letter-spacing: 0.1em; }
  .back:hover { color: var(--text); }
  .page-title { font-size: 11px; font-weight: 600; letter-spacing: 0.18em; color: var(--muted); text-transform: uppercase; }
  .save-btn { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 7px 16px; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
  .save-btn:hover { opacity: 0.85; }
  .save-btn.success { background: var(--green); color: #000; }
  .save-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .main { max-width: 680px; margin: 0 auto; }
  .label { font-size: 10px; font-weight: 600; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-bottom: 14px; }
  .add-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 22px; margin-bottom: 32px; }
  .add-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
  .date-input { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; color: var(--muted); font-size: 12px; font-family: inherit; outline: none; }
  .date-input:focus { border-color: var(--accent); }
  textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-size: 13px; font-family: inherit; outline: none; resize: none; line-height: 1.6; transition: border-color 0.15s; }
  textarea:focus { border-color: var(--accent); }
  .add-footer { display: flex; justify-content: flex-end; margin-top: 10px; }
  .entries { display: flex; flex-direction: column; gap: 10px; }
  .entry { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; }
  .entry-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .entry-date { font-size: 10px; font-weight: 600; letter-spacing: 0.14em; color: var(--accent); text-transform: uppercase; }
  .del-btn { background: none; border: none; color: var(--muted); font-size: 14px; cursor: pointer; padding: 0; line-height: 1; opacity: 0; transition: opacity 0.15s, color 0.15s; }
  .entry:hover .del-btn { opacity: 1; }
  .del-btn:hover { color: var(--red); }
  .entry-text { font-size: 13px; color: var(--muted); line-height: 1.7; white-space: pre-wrap; }
  .empty { font-size: 13px; color: #333; text-align: center; padding: 40px 0; }
  .sync-status { font-size: 11px; color: var(--muted); text-align: right; margin-bottom: 12px; min-height: 16px; }
</style>
</head>
<body>
<div class="header">
  <a class="back" href="index.html">← BACK</a>
  <div class="page-title">Memory</div>
  <div style="width:60px"></div>
</div>
<div class="main">
  <div class="label">New Entry</div>
  <div class="add-panel">
    <div class="add-row">
      <input class="date-input" type="date" id="entryDate">
    </div>
    <textarea id="entryText" rows="5" placeholder="记录这次对话做了什么、聊了什么、有什么结论…"></textarea>
    <div class="add-footer">
      <button class="save-btn" id="addBtn" onclick="addEntry()">ADD</button>
    </div>
  </div>

  <div class="label">Records</div>
  <div class="sync-status" id="syncStatus"></div>
  <div class="entries" id="entriesList"><div class="empty">暂无记录</div></div>
</div>

<script>
const OWNER = 'webkit1005-collab';
const REPO = 'context-handoff';
const API = 'https://api.github.com';
const PATH = 'data/memories.json';

function getToken() { return localStorage.getItem('ch_token'); }
function status(msg) { document.getElementById('syncStatus').textContent = msg; }

let memories = [];
let fileSha = null;

const today = new Date().toISOString().slice(0,10);
document.getElementById('entryDate').value = today;

async function load() {
  const t = getToken();
  if (!t) { status('未设置 Token，请先在首页配置'); return; }
  status('加载中…');
  try {
    const r = await fetch(`${API}/repos/${OWNER}/${REPO}/contents/${PATH}`, {
      headers: { Authorization: `token ${t}` }
    });
    if (r.status === 404) { memories = []; fileSha = null; status(''); render(); return; }
    if (!r.ok) throw new Error();
    const j = await r.json();
    fileSha = j.sha;
    memories = JSON.parse(atob(j.content.replace(/\n/g,'')));
    status('');
    render();
  } catch { status('加载失败'); }
}

async function persist(msg) {
  const t = getToken();
  if (!t) return false;
  const body = { message: msg, content: btoa(unescape(encodeURIComponent(JSON.stringify(memories, null, 2)))) };
  if (fileSha) body.sha = fileSha;
  const r = await fetch(`${API}/repos/${OWNER}/${REPO}/contents/${PATH}`, {
    method: 'PUT',
    headers: { Authorization: `token ${t}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (r.ok) { const j = await r.json(); fileSha = j.content.sha; return true; }
  return false;
}

async function addEntry() {
  const text = document.getElementById('entryText').value.trim();
  const date = document.getElementById('entryDate').value;
  if (!text) return;
  const btn = document.getElementById('addBtn');
  btn.disabled = true; btn.textContent = '…';
  memories.unshift({ id: Date.now(), date, summary: text });
  status('保存中…');
  const ok = await persist('add memory entry');
  if (ok) {
    document.getElementById('entryText').value = '';
    document.getElementById('entryDate').value = today;
    status('');
    btn.textContent = 'ADDED'; btn.classList.add('success');
    setTimeout(() => { btn.textContent = 'ADD'; btn.classList.remove('success'); btn.disabled = false; }, 1200);
    render();
  } else {
    memories.shift();
    status('保存失败');
    btn.textContent = 'ADD'; btn.disabled = false;
  }
}

async function deleteEntry(id) {
  const idx = memories.findIndex(m => m.id === id);
  if (idx === -1) return;
  const removed = memories.splice(idx, 1)[0];
  status('删除中…');
  const ok = await persist('delete memory entry');
  if (ok) { status(''); render(); }
  else { memories.splice(idx, 0, removed); status('删除失败'); render(); }
}

function render() {
  const el = document.getElementById('entriesList');
  if (!memories.length) { el.innerHTML = '<div class="empty">暂无记录</div>'; return; }
  el.innerHTML = memories.map(m => `
    <div class="entry">
      <div class="entry-header">
        <div class="entry-date">${m.date}</div>
        <button class="del-btn" onclick="deleteEntry(${m.id})">×</button>
      </div>
      <div class="entry-text">${m.summary.replace(/</g,'&lt;')}</div>
    </div>`).join('');
}

load();
</script>
</body>
</html>
