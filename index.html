<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONTEXT HANDOFF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0f; --surface: #161618; --surface2: #1e1e21;
    --border: #2a2a2e; --text: #e8e8ea; --muted: #666;
    --accent: #7c6ef5; --accent-dim: rgba(124,110,245,0.12);
    --green: #4ade80; --red: #f87171;
  }
  body { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 40px 24px; }
  .header { max-width: 900px; margin: 0 auto 48px; display: flex; justify-content: space-between; align-items: flex-end; }
  .site-title { font-size: 11px; font-weight: 600; letter-spacing: 0.18em; color: var(--muted); text-transform: uppercase; }
  .clock { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .main { max-width: 900px; margin: 0 auto; }
  .label { font-size: 10px; font-weight: 600; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-bottom: 16px; }

  .modules { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 40px; }
  @media (max-width: 800px) { .modules { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 400px) { .modules { grid-template-columns: 1fr; } }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 22px; text-decoration: none; color: inherit; transition: border-color 0.15s, background 0.15s; display: flex; flex-direction: column; }
  .card:hover { border-color: var(--accent); background: var(--surface2); }
  .card-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--accent-dim); display: flex; align-items: center; justify-content: center; margin-bottom: 14px; font-size: 15px; flex-shrink: 0; }
  .card-name { font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 6px; }
  .card-desc { font-size: 12px; color: var(--muted); line-height: 1.5; flex: 1; }
  .card-meta { margin-top: 14px; font-size: 11px; color: #444; min-height: 16px; }

  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; }
  .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .panel-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }

  .pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill { font-size: 10px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; padding: 5px 13px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .pill:not(.active):hover { border-color: var(--accent); color: var(--accent); }

  .btn { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 7px 14px; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.85; }
  .btn.success { background: var(--green); color: #000; }
  .btn.secondary { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn.secondary:hover { border-color: var(--red); color: var(--red); opacity: 1; }
  .context-box { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px; font-size: 13px; color: var(--muted); line-height: 1.7; white-space: pre-wrap; max-height: 220px; overflow-y: auto; font-family: inherit; }
  .status-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; }

  .setup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
  .setup-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 100%; max-width: 420px; }
  .setup-title { font-size: 11px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 8px; }
  .setup-desc { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 20px; }
  .setup-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 12px; font-family: monospace; outline: none; }
  .setup-input:focus { border-color: var(--accent); }
  .setup-actions { display: flex; gap: 8px; margin-top: 16px; }
</style>
</head>
<body>

<div class="setup-overlay" id="setupOverlay" style="display:none">
  <div class="setup-box">
    <div class="setup-title">GitHub Token</div>
    <div class="setup-desc">需要一个 GitHub Personal Access Token 来读写数据。只需输入一次，存在本地浏览器里。Token 需要有 repo 权限。</div>
    <input class="setup-input" id="tokenInput" type="password" placeholder="ghp_xxxxxxxxxxxx">
    <div class="setup-actions"><button class="btn" onclick="saveToken()">SAVE</button></div>
  </div>
</div>

<div class="header">
  <div class="site-title">Context Handoff</div>
  <div style="display:flex;gap:16px;align-items:center">
    <button class="btn secondary" onclick="resetToken()" style="padding:4px 10px;font-size:10px">TOKEN</button>
    <div class="clock" id="clock">--:--:--</div>
  </div>
</div>

<div class="main">
  <div class="label">Modules</div>
  <div class="modules">
    <a class="card" href="profile.html">
      <div class="card-icon">◈</div>
      <div class="card-name">Profile</div>
      <div class="card-desc">个人信息，给 Claude 的基础上下文</div>
      <div class="card-meta" id="profile-meta"></div>
    </a>
    <a class="card" href="todolist.html">
      <div class="card-icon">✓</div>
      <div class="card-name">Todolist</div>
      <div class="card-desc">话题追踪、任务、DDL</div>
      <div class="card-meta" id="todo-meta"></div>
    </a>
    <a class="card" href="memory.html">
      <div class="card-icon">◎</div>
      <div class="card-name">Memory</div>
      <div class="card-desc">换窗交接 + 日常笔记</div>
      <div class="card-meta" id="mem-meta"></div>
    </a>
    <a class="card" href="ombrebrain.html">
      <div class="card-icon">◉</div>
      <div class="card-name">Ombre Brain</div>
      <div class="card-desc">记忆系统，指令模板 + 使用指南</div>
      <div class="card-meta"></div>
    </a>
  </div>

  <div class="label">Claude Context</div>
  <div class="panel">
    <div class="panel-top">
      <div class="pills">
        <button class="pill active" id="pill-profile" onclick="togglePill('profile')">Profile</button>
        <button class="pill active" id="pill-todos" onclick="togglePill('todos')">Todos</button>
        <button class="pill active" id="pill-memory" onclick="togglePill('memory')">Memory</button>
      </div>
      <button class="btn" id="copyBtn" onclick="copyContext()">COPY</button>
    </div>
    <div class="status-row">
      <span style="font-size:11px;color:var(--muted)">
        <span class="dot" id="statusDot" style="background:var(--muted)"></span>
        <span id="statusText">加载中…</span>
      </span>
    </div>
    <div class="context-box" id="contextBox"></div>
  </div>
</div>

<script>
const OWNER = 'webkit1005-collab', REPO = 'context-handoff', API = 'https://api.github.com';
const CACHE_KEY = 'ch_index_cache', TOGGLE_KEY = 'ch_context_toggles';

function getToken() { return localStorage.getItem('ch_token'); }
function saveToken() { const t = document.getElementById('tokenInput').value.trim(); if (!t) return; localStorage.setItem('ch_token', t); document.getElementById('setupOverlay').style.display = 'none'; init(); }
function resetToken() { localStorage.removeItem('ch_token'); document.getElementById('tokenInput').value = ''; document.getElementById('setupOverlay').style.display = 'flex'; }
function clock() { document.getElementById('clock').textContent = new Date().toLocaleTimeString('zh-CN', {hour12:false}); }
setInterval(clock, 1000); clock();

let toggles = { profile: true, todos: true, memory: true };
let cachedProfile = null, cachedTodos = null, cachedMemories = null;

function loadToggles() {
  const saved = localStorage.getItem(TOGGLE_KEY);
  if (saved) { try { toggles = JSON.parse(saved); } catch {} }
  ['profile','todos','memory'].forEach(k => {
    document.getElementById('pill-'+k).classList.toggle('active', toggles[k]);
  });
}

function togglePill(name) {
  toggles[name] = !toggles[name];
  document.getElementById('pill-'+name).classList.toggle('active', toggles[name]);
  localStorage.setItem(TOGGLE_KEY, JSON.stringify(toggles));
  renderContext();
}

function renderContext() {
  const parts = [];
  if (toggles.profile && cachedProfile && cachedProfile.summary) {
    parts.push(cachedProfile.summary);
    document.getElementById('profile-meta').textContent = '已加载';
  }
  if (toggles.todos && cachedTodos) {
    const active = (cachedTodos.topics||[]).filter(t => !t.done);
    if (active.length) {
      parts.push(active.map(t => '• ' + t.text + (t.ddl ? '  [DDL ' + t.ddl + ']' : '')).join('\n'));
    }
    document.getElementById('todo-meta').textContent = active.length ? active.length + ' 条未完成' : '';
  }
  if (toggles.memory && cachedMemories) {
    const latest = (cachedMemories.handoffs||[])[0];
    if (latest && latest.content) parts.push(latest.content);
    const total = (cachedMemories.handoffs||[]).length + (cachedMemories.journal||[]).length;
    document.getElementById('mem-meta').textContent = total ? total + ' 条记录' : '';
  }
  const result = parts.join('\n\n');
  document.getElementById('contextBox').textContent = result || '（暂无数据，请先填写各模块）';
  localStorage.setItem(CACHE_KEY, JSON.stringify({ profile: cachedProfile, todos: cachedTodos, memories: cachedMemories }));
  document.getElementById('statusDot').style.cssText = 'background:var(--green);box-shadow:0 0 6px var(--green)';
  document.getElementById('statusText').textContent = 'Ready to copy';
}

async function fetchJSON(path) {
  const t = getToken(); if (!t) return null;
  try {
    const r = await fetch(API + '/repos/' + OWNER + '/' + REPO + '/contents/data/' + path, { headers: { Authorization: 'token ' + t } });
    if (!r.ok) return null;
    const j = await r.json();
    return JSON.parse(decodeURIComponent(escape(atob(j.content.replace(/\n/g,'')))));
  } catch { return null; }
}

async function fetchTodos() {
  const t = getToken(); if (!t) return null;
  try {
    const r = await fetch(API + '/repos/webkit1005-collab/todolist-data/contents/state.json', { headers: { Authorization: 'token ' + t } });
    if (!r.ok) return null;
    const j = await r.json();
    return JSON.parse(decodeURIComponent(escape(atob(j.content.replace(/\n/g,'')))));
  } catch { return null; }
}

async function buildContext() {
  const cached = localStorage.getItem(CACHE_KEY);
  if (cached) {
    try {
      const c = JSON.parse(cached);
      cachedProfile = c.profile; cachedTodos = c.todos; cachedMemories = c.memories;
      renderContext();
    } catch {}
  }
  const [todos, memories, profile] = await Promise.all([fetchTodos(), fetchJSON('memories.json'), fetchJSON('profile.json')]);
  cachedTodos = todos; cachedMemories = memories; cachedProfile = profile;
  renderContext();
}

function copyContext() {
  const text = document.getElementById('contextBox').textContent;
  navigator.clipboard.writeText(text);
  const btn = document.getElementById('copyBtn');
  btn.textContent = 'COPIED'; btn.classList.add('success');
  setTimeout(() => { btn.textContent = 'COPY'; btn.classList.remove('success'); }, 1500);
}

function init() {
  if (!getToken()) { document.getElementById('setupOverlay').style.display = 'flex'; return; }
  loadToggles();
  buildContext();
}
init();
</script>
</body>
</html>
